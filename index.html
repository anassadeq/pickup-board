<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickup - Submit Name</title>
<style>
  :root{ --accent:#3b82f6; --text-dark:#0f172a; }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0f172a; padding:20px;
  }
  .card{
    background:#f8fafc; color:var(--text-dark);
    border-radius:20px; padding:32px; width:100%; max-width:420px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
  }
  .card h2{margin-top:0; font-size:1.4rem;}
  .card h2 .ar{display:block; font-size:1rem; font-weight:400; color:#64748b; direction:rtl; margin-top:4px;}
  .card label{display:block; font-weight:600; margin:16px 0 6px; font-size:0.95rem;}
  .card label .ar{display:block; font-weight:400; color:#64748b; font-size:0.85rem; direction:rtl;}
  .card input{
    width:100%; padding:14px; font-size:1.1rem; border-radius:10px;
    border:2px solid #e2e8f0; outline:none;
  }
  .card input:focus{border-color:var(--accent);}
  .card button{
    width:100%; margin-top:22px; padding:16px; font-size:1.1rem; font-weight:700;
    background:var(--accent); color:#fff; border:none; border-radius:12px; cursor:pointer;
  }
  .card button:disabled{opacity:0.6;}
  .confirm{
    display:none; text-align:center; padding:24px;
    background:#dcfce7; border-radius:14px; color:#166534; font-weight:600; font-size:1.15rem;
  }
  .confirm .ar{display:block; direction:rtl; font-weight:400; margin-top:6px; font-size:1rem;}
</style>
</head>
<body>
  <div class="card">
    <div id="form-view">
      <h2>Enter child's name<span class="ar">أدخل اسم الطفل</span></h2>
      <label>Child's Name <span class="ar">اسم الطفل</span></label>
      <input id="p-name" type="text" placeholder="e.g. Layla Ahmad">
      <button id="p-submit">Send / إرسال</button>
    </div>
    <div class="confirm" id="p-confirm">
      ✅ Sent! The teacher will see it now.
      <span class="ar">تم الإرسال! سيراه المعلم الآن</span>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpcNU0ANe3waJf5zfbnIdSIVRAuyGmz0A",
  authDomain: "pick-up-16a8e.firebaseapp.com",
  projectId: "pick-up-16a8e",
  storageBucket: "pick-up-16a8e.firebasestorage.app",
  messagingSenderId: "484808992036",
  appId: "1:484808992036:web:37376a12abf4d30bbbbfb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const stateRef = doc(db, "pickupBoard", "queue");
const MAX_ACTIVE = 30;

document.getElementById('p-submit').onclick = async ()=>{
  const nameInput = document.getElementById('p-name');
  const name = nameInput.value.trim();
  if(!name){ alert('Please enter a name / الرجاء إدخال الاسم'); return; }

  const btn = document.getElementById('p-submit');
  btn.disabled = true; btn.textContent = 'Sending...';

  try{
    const entry = { id: Date.now()+'-'+Math.random().toString(36).slice(2,7), name, ts: Date.now() };
    const snap = await getDoc(stateRef);
    const state = snap.exists() ? snap.data() : { active: [], waiting: [] };
    if(!state.active) state.active = [];
    if(!state.waiting) state.waiting = [];
    if(state.active.length < MAX_ACTIVE) state.active.push(entry);
    else state.waiting.push(entry);
    await setDoc(stateRef, state);

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('p-confirm').style.display = 'block';
  }catch(e){
    console.error(e);
    alert('Something went wrong sending the name. Please try again.');
    btn.disabled = false; btn.textContent = 'Send / إرسال';
  }
};
</script>
</body>
</html>
