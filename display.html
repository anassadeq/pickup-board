<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickup Display</title>
<style>
  :root{ --bg:#0f172a; --panel:#1e293b; --accent:#22c55e; --warn:#ef4444; --muted:#94a3b8; --text:#f1f5f9; }
  *{box-sizing:border-box;}
  body{ margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:24px; }
  .disp-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
  .disp-header h1{margin:0; font-size:1.6rem;}
  .disp-header .sub{color:var(--muted); font-size:0.95rem; margin-top:2px;}
  .clear-all{
    background:transparent; border:2px solid var(--warn); color:var(--warn);
    padding:10px 16px; border-radius:10px; font-weight:600; cursor:pointer;
  }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px; }
  .name-card{
    background:var(--panel); border-radius:18px; padding:26px;
    display:flex; flex-direction:column; justify-content:space-between;
    border:1px solid #334155; min-height:150px;
  }
  .name-card .nm{font-size:2rem; font-weight:800; line-height:1.15; word-break:break-word;}
  .name-card .cls{color:var(--muted); font-size:1rem; margin-top:4px;}
  .name-card .clear-btn{
    align-self:flex-end; margin-top:14px; background:var(--accent);
    color:#06301a; border:none; padding:10px 16px; border-radius:10px;
    font-weight:700; cursor:pointer;
  }
  .empty-slot{
    border:2px dashed #334155; border-radius:18px; min-height:150px;
    display:flex; align-items:center; justify-content:center; color:#475569;
  }
  .waiting-bar{
    background:var(--panel); border-radius:14px; padding:14px 18px;
    color:var(--muted); font-size:0.95rem; margin-top:18px;
  }
  .status{position:fixed; top:10px; right:16px; font-size:0.75rem; color:var(--muted);}
</style>
</head>
<body>
  <div class="status" id="status">connecting...</div>
  <div class="disp-header">
    <div>
      <h1>Pickup Queue</h1>
      <div class="sub">طابور الاستلام — tap a card once the child is picked up</div>
    </div>
    <button class="clear-all" id="d-clearall">Clear All</button>
  </div>
  <div class="grid" id="d-grid"></div>
  <div class="waiting-bar" id="d-waiting"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpcNU0ANe3waJf5zfbnIdSIVRAuyGmz0A",
  authDomain: "pick-up-16a8e.firebaseapp.com",
  projectId: "pick-up-16a8e",
  storageBucket: "pick-up-16a8e.firebasestorage.app",
  messagingSenderId: "484808992036",
  appId: "1:484808992036:web:37376a12abf4d30bbbbfb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const stateRef = doc(db, "pickupBoard", "queue");
const MAX_ACTIVE = 6;

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function render(state){
  const grid = document.getElementById('d-grid');
  grid.innerHTML = '';
  const active = state.active || [];
  const waiting = state.waiting || [];

  for(let i=0;i<MAX_ACTIVE;i++){
    const entry = active[i];
    if(entry){
      const card = document.createElement('div');
      card.className = 'name-card';
      card.innerHTML = `<div><div class="nm">${escapeHtml(entry.name)}</div>${entry.code?`<div class="cls">${escapeHtml(entry.code)}</div>`:''}</div>
        <button class="clear-btn" data-id="${entry.id}">✓ Picked Up</button>`;
      grid.appendChild(card);
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty-slot';
      empty.textContent = '—';
      grid.appendChild(empty);
    }
  }
  grid.querySelectorAll('.clear-btn').forEach(btn=>{
    btn.onclick = ()=> clearEntry(btn.dataset.id, state);
  });

  const waitBar = document.getElementById('d-waiting');
  waitBar.textContent = waiting.length
    ? `Waiting (${waiting.length}): ` + waiting.map(e=>e.name).join(', ')
    : 'No one waiting in the queue.';
}

async function clearEntry(id, state){
  const active = (state.active || []).filter(e=>e.id !== id);
  const waiting = [...(state.waiting || [])];
  if(waiting.length) active.push(waiting.shift());
  await setDoc(stateRef, { active, waiting });
}

document.getElementById('d-clearall').onclick = async ()=>{
  if(!confirm('Clear the entire queue? / مسح الطابور بالكامل؟')) return;
  await setDoc(stateRef, { active: [], waiting: [] });
};

onSnapshot(stateRef, (snap)=>{
  document.getElementById('status').textContent = 'live';
  render(snap.exists() ? snap.data() : { active: [], waiting: [] });
}, (err)=>{
  console.error(err);
  document.getElementById('status').textContent = 'connection error';
});
</script>
</body>
</html>
